name: Prebuild & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest-large
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (skip native build)
        run: npm install --ignore-scripts

      - name: Build native module
        run: npx cmake-js compile --release -r node -v $(node -v | tr -d v)

      - name: Copy binary into platform package
        shell: bash
        run: |
          NODE_FILE=$(find build -name "llama_node.node" -type f | head -1)
          if [ -z "$NODE_FILE" ]; then
            echo "::error::Could not find llama_node.node"
            exit 1
          fi
          PKG_DIR="npm/${{ matrix.platform }}-${{ matrix.arch }}"
          cp "$NODE_FILE" "${PKG_DIR}/llama_node.node"

      - name: Publish platform package
        shell: bash
        run: npm publish --access public --provenance
        working-directory: npm/${{ matrix.platform }}-${{ matrix.arch }}

      - name: Package tarball for GitHub release
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          mkdir -p staging/build/Release
          cp "npm/${{ matrix.platform }}-${{ matrix.arch }}/llama_node.node" staging/build/Release/
          TARBALL="llama-cpp-node-api-v${PACKAGE_VERSION}-napi-v8-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "${TARBALL}" -C staging build/Release/llama_node.node
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          draft: false

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish meta package
        run: npm publish --access public --provenance
