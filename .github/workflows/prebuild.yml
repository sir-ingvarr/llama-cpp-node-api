name: Prebuild & Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger to validate the build matrix on all platforms WITHOUT
  # publishing (the publish job is gated on a tag ref below). Use this to
  # confirm Windows/Linux compile green before cutting a release tag.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # Build the native binary on every target platform and upload it as an
  # artifact. NOTHING is published here — a failure on any platform must
  # prevent the whole release (see the `publish` job's `needs: build`).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest-large
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies (skip native build)
        run: npm install --ignore-scripts

      - name: Build native module
        run: npx cmake-js compile --release -r node -v $(node -v | tr -d v)

      - name: Stage binary for upload
        shell: bash
        run: |
          set -euo pipefail
          NODE_FILE=$(find build -name "llama_node.node" -type f | head -1)
          if [ -z "$NODE_FILE" ]; then
            echo "::error::Could not find llama_node.node"
            exit 1
          fi
          mkdir -p artifact
          cp "$NODE_FILE" artifact/llama_node.node

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifact/llama_node.node
          if-no-files-found: error
          retention-days: 1

  # Runs only if ALL four build jobs succeeded. Publishes every platform
  # package + the meta package and creates the single GitHub release.
  # Because this is one job, there is no race to create the release, and
  # because it `needs: build`, a partial build never publishes anything.
  publish:
    needs: build
    # Only publish on a real tag push. A manual workflow_dispatch run builds
    # the full matrix but skips this job, so you can dry-run the Windows/Linux
    # compile without publishing anything or consuming a version number.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download all platform binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage binaries into packages and build release tarballs
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          mkdir -p release
          for triple in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            SRC="artifacts/binary-${triple}/llama_node.node"
            if [ ! -f "$SRC" ]; then
              echo "::error::Missing binary for ${triple} — refusing to publish a partial release"
              exit 1
            fi
            cp "$SRC" "npm/${triple}/llama_node.node"
            mkdir -p staging/build/Release
            cp "$SRC" staging/build/Release/llama_node.node
            tar -czf "release/llama-cpp-node-api-v${PACKAGE_VERSION}-napi-v8-${triple}.tar.gz" \
              -C staging build/Release/llama_node.node
            rm -rf staging
          done

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for triple in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            echo "Publishing @llama-cpp-node-api/${triple}"
            ( cd "npm/${triple}" && npm publish --access public --provenance )
          done

      - name: Publish meta package
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
